title: libxml2 (Code Coverage)

put: fcc/subjects/libxml2/libxml2-2.9.7/instrumentation/xmllint

specifications:
  - title: Execution Feedback
    short-title: executionfeedback
    plot-color: "#ff7f0e"
    path: evaluation/execution_feedback/subjects/libxml2/specifications/libxml2-codecoverage-0.fan

  - title: Input Spec.
    short-title: inputspec
    plot-color: "#1f77b4"
    path: evaluation/execution_feedback/subjects/libxml2/specifications/libxml2-codecoverage-1.fan

  - title: Input Spec. + Execution Feedback
    short-title: inputspec_executionfeedback
    plot-color: "#2ca02c"
    path: evaluation/execution_feedback/subjects/libxml2/specifications/libxml2-codecoverage-2.fan

metric: 'trace.CodeCoverage()'
aggregation: max
repetitions: 10
timelimit: 3600
population-size: 1000
y-label: Basic Block Coverage

output-dir: experiment_output/