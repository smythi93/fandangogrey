title: lunasvg-svg2png (Heap Allocations)

put: fcc/subjects/lunasvg/lunasvg/instrumentation/svg2png

specifications:
  - title: Execution Feedback
    short-title: executionfeedback
    plot-color: "#ff7f0e"
    path: evaluation/execution_feedback/subjects/lunasvg/specifications/lunasvg-memory-0.fan

  - title: Input Spec.
    short-title: inputspec
    plot-color: "#1f77b4"
    path: evaluation/execution_feedback/subjects/lunasvg/specifications/lunasvg-memory-1.fan

  - title: Input Spec. + Execution Feedback
    short-title: inputspec_executionfeedback
    plot-color: "#2ca02c"
    path: evaluation/execution_feedback/subjects/lunasvg/specifications/lunasvg-memory-2.fan

metric: 'trace.HeapAllocatedBytes()'
aggregation: max
repetitions: 10
timelimit: 3600
population-size: 1000
y-label: Heap Allocated Bytes

output-dir: experiment_output/