title: cJSON (Directed Fuzzing)

put: fcc/subjects/cjson/cJSON/instrumentation/harness

specifications:
  - title: Execution Feedback
    short-title: executionfeedback
    plot-color: "#ff7f0e"
    path: evaluation/execution_feedback/subjects/cjson/specifications/cjson-dgf-0.fan

  - title: Input Spec.
    short-title: inputspec
    plot-color: "#1f77b4"
    path: evaluation/execution_feedback/subjects/cjson/specifications/cjson-dgf-1.fan

  - title: Input Spec. + Execution Feedback
    short-title: inputspec_executionfeedback
    plot-color: "#2ca02c"
    path: evaluation/execution_feedback/subjects/cjson/specifications/cjson-dgf-2.fan


metric: 'trace.DistanceToBB("harness.c", "2")'

aggregation: min
repetitions: 10
timelimit: 21600
population-size: 1000
y-label: Control-Flow Distance

output-dir: experiment_output/